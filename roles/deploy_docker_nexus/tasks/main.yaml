- name: make data dir
  ansible.builtin.file:
    path: "{{ docker_nexus_data_path }}"
    recurse: true
    state: directory
    owner: "200"
    group: "200"

- name: deploy nexus container
  community.docker.docker_container:
    name: some-nexus-container
    image: "sonatype/nexus3:3.89.1-alpine"
    volumes:
      - "{{ docker_nexus_data_path }}:/nexus-data"
    state: started
    restart: true
    restart_policy: always
    networks:
      - name: proxy_network
    labels:
      # https redirection explicitly disabled here
      caddy: "http://nexus.{{ vault_internal_domain_name }}"
      caddy.reverse_proxy: "{{ '{{' }}upstreams 8081{{ '}}' }}"
