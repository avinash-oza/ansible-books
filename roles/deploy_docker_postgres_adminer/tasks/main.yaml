---
# run adminer as needed with docker run --network db_network -p 8089:8080 adminer to start on 8089

- name: deploy postgres container
  community.docker.docker_container:
    name: some-postgres-container
#   image: "postgres:16"
#   image: "tensorchord/pgvecto-rs:pg16-v0.2.0"
    image: "ghcr.io/immich-app/postgres:16-vectorchord0.3.0-pgvectors0.2.0"
    state: started
    restart_policy: always
    volumes:
      - "{{ docker_data_path }}/postgres:/var/lib/postgresql/data"
    networks:
      - name: db_network
    env:
      POSTGRES_DB: immich
      POSTGRES_PASSWORD: "{{ vault_postgres_root_password }}"
      DB_STORAGE_TYPE: "HDD"

- name: deploy postgres backup container
  community.docker.docker_container:
    name: some-postgres-backup-container
    image: "tiredofit/db-backup:4.1.100"
    state: started
    restart_policy: always
    networks:
      - name: db_network
    env:
      CONTAINER_ENABLE_MONITORING: "FALSE"
      DEFAULT_BACKUP_LOCATION: "S3"
      DEFAULT_S3_BUCKET: "{{ vault_aws_projects_bucket }}"
      DEFAULT_S3_REGION: "{{ vault_aws_default_region }}"
      DEFAULT_S3_PATH: "backups/db/postgres"
      DEFAULT_S3_KEY_ID: "{{ vault_aws_keys['db-backup']['key_id'] }}"
      DEFAULT_S3_KEY_SECRET: "{{ vault_aws_keys['db-backup']['access_key'] }}"
      DEFAULT_BACKUP_BEGIN: "2355" # 11:55 PM GMT
      # 20 days
      DEFAULT_CLEANUP_TIME: "28800"
      # 7 days
      DEFAULT_BACKUP_INTERVAL: "10080"
      DB01_TYPE: "pgsql"
      DB01_HOST: "some-postgres-container"
      DB01_NAME: "immich"
      DB01_SPLIT_DB: "TRUE"
      DB01_USER: postgres
      DB01_PASS: "{{ vault_postgres_root_password }}"

      DB02_TYPE: "pgsql"
      DB02_HOST: "some-postgres-container"
      DB02_NAME: "lubelogger"
      DB02_SPLIT_DB: "TRUE"
      DB02_USER: postgres
      DB02_PASS: "{{ vault_postgres_root_password }}"

