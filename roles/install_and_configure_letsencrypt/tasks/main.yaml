# noqa: yaml[empty-lines] yaml[line-length]
- name: Install snap for certbot
  become: true
  community.general.snap:
    name: certbot
    classic: true

- name: Setup awscli
  ansible.builtin.include_role:
    name: setup_awscli

- name: copy over send-letsencrypt-log-sns.sh
  ansible.builtin.include_role:
    name: copy_scripts
  vars:
    script_to_copy: send-letsencrypt-log-sns.sh
    file_permissions: '0700'
    file_owner: root
    file_group: root

- name: setup job to auto renew if close to expiry
  ansible.builtin.cron:
    name: certbot-auto renew certificate
    special_time: weekly
    job: "/snap/bin/certbot certonly --domains {{ vault_local_domain_name }} -n --standalone --deploy-hook \"docker restart some-apache2-container\" > /tmp/letsencryptoutput.log 2>&1; /opt/scripts/send-letsencrypt-log-sns.sh; rm /tmp/letsencryptoutput.log"
    state: present

